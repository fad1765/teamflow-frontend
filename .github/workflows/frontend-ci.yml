name: Frontend CI

on:
  push:
    branches:
      - master
      - feature/github-actions
      - feature/docker-ci-cd
  pull_request:
    branches:
      - master

jobs:
  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
  
  docker-build:
    name: Build Frontend Docker Image
    runs-on: ubuntu-latest
    needs: frontend-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t teamflow-frontend:test .